name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  desktop:
    name: Desktop GUI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - name: Check out source
        uses: actions/checkout@v7
      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type-check
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Build renderer and Electron main process
        run: npm run build

  android-client:
    name: Android client
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v7
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Install Android 17 SDK
        run: sdkmanager --channel=3 "platforms;android-37.0" "build-tools;37.0.0" "platform-tools"
      - name: Test, lint, and build client
        run: bash ./gradlew :app:testDebugUnitTest :app:lintDebug :app:assembleDebug --stacktrace
      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: revbridge-client-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  relay:
    name: Native relay (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: relay-rust
    steps:
      - name: Check out source
        uses: actions/checkout@v7
      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt
      - name: Check formatting
        if: runner.os == 'Linux'
        run: cargo fmt --all -- --check
      - name: Test
        run: cargo test --locked
      - name: Build release relay
        run: cargo build --release --locked
      - name: Upload relay
        uses: actions/upload-artifact@v7
        with:
          name: revbridge-relay-${{ runner.os }}
          path: |
            relay-rust/target/release/revbridge-relay
            relay-rust/target/release/revbridge-relay.exe
          if-no-files-found: error
