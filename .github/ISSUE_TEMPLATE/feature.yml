name: Feature request
description: Suggest an improvement to RevBridge
title: "[Feature]: "
labels: [enhancement, needs-triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What becomes difficult or impossible without this change?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy expectations
      options:
        - label: This proposal does not require hidden telemetry or uploading browsing data.
          required: true
